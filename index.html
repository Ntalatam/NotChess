<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Wacko Chess is a local two-player chess variant with chaos cards, mutations, animated hazards, and a polished canvas board."
    />
    <title>Wacko Chess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Crimson+Pro:ital,wght@0,500;0,700;1,500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell" data-screen="menu">
      <main class="game-layout" aria-label="Wacko Chess game board">
        <section class="arena" aria-label="Board and players">
          <div class="player-panel player-panel--top" id="blackHud"></div>
          <div class="hand-row hand-row--opponent" id="blackHand" aria-label="Black hand"></div>

          <div class="board-stage">
            <canvas
              id="boardCanvas"
              width="760"
              height="760"
              aria-label="Wacko Chess board"
            ></canvas>
            <div class="board-vignette" aria-hidden="true"></div>
            <div class="announcement" id="announcement" aria-live="polite"></div>
          </div>

          <div class="hand-row hand-row--player" id="whiteHand" aria-label="White hand"></div>
          <div class="player-panel player-panel--bottom" id="whiteHud"></div>
        </section>

        <aside class="sidebar" id="sidebar" aria-label="Game status">
          <div class="sidebar-section sidebar-section--turn">
            <p class="section-kicker">Turn</p>
            <h2 id="turnStatus">Turn 1 - White</h2>
            <p id="roundStatus">Local duel</p>
          </div>

          <div class="sidebar-section">
            <div class="section-heading">
              <p class="section-kicker">Chaos Meter</p>
              <strong id="chaosCountdown">10 turns</strong>
            </div>
            <div
              class="chaos-meter"
              role="meter"
              aria-label="Chaos meter"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
            >
              <span id="chaosMeterFill"></span>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="section-heading">
              <p class="section-kicker">Deck</p>
              <strong id="deckStatus">40 / 0</strong>
            </div>
            <div class="deck-stack" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="sidebar-section">
            <p class="section-kicker">Active Events</p>
            <ul class="event-list event-list--active" id="activeEvents"></ul>
          </div>

          <div class="sidebar-section sidebar-section--log">
            <p class="section-kicker">Event Log</p>
            <ol class="event-log" id="eventLog"></ol>
          </div>
        </aside>
      </main>

      <div class="menu-overlay" id="menuOverlay" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
        <div class="menu-hero" aria-hidden="true">
          <canvas id="menuCanvas" width="1280" height="720"></canvas>
        </div>
        <form class="start-panel" id="startForm">
          <p class="eyebrow">Local Two Player</p>
          <h1 id="menuTitle">Wacko Chess</h1>
          <div class="settings-grid">
            <label class="field">
              <span>White Player</span>
              <input id="whiteNameInput" name="whiteName" autocomplete="off" maxlength="20" value="White" />
            </label>
            <label class="field">
              <span>Black Player</span>
              <input id="blackNameInput" name="blackName" autocomplete="off" maxlength="20" value="Black" />
            </label>
          </div>

          <fieldset class="segmented">
            <legend>Chaos Intensity</legend>
            <label>
              <input type="radio" name="intensity" value="mild" />
              <span>Mild</span>
            </label>
            <label>
              <input type="radio" name="intensity" value="standard" checked />
              <span>Standard</span>
            </label>
            <label>
              <input type="radio" name="intensity" value="unhinged" />
              <span>Unhinged</span>
            </label>
          </fieldset>

          <fieldset class="segmented segmented--timer">
            <legend>Timer</legend>
            <label>
              <input type="radio" name="timer" value="unlimited" checked />
              <span>Unlimited</span>
            </label>
            <label>
              <input type="radio" name="timer" value="10" />
              <span>10 min</span>
            </label>
            <label>
              <input type="radio" name="timer" value="5" />
              <span>5 min</span>
            </label>
          </fieldset>

          <div class="stats-strip" id="statsStrip"></div>
          <button class="primary-action" type="submit">Begin Match</button>
        </form>
      </div>

      <div class="end-overlay" id="endOverlay" aria-live="polite" hidden></div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
